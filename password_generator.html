<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            background: #0b0d17;
        }
        .container{
            background: #161925;
            padding: 50px;
            border-radius: 15px;
            width:400px;
            border: 3px solid rgba(0, 210, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h2{
            color: #00d2ff;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .display{
            background: #0b0d17;
            display: flex;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .display input{
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            font-family: monospace;
            font-size: 1rem;
            color: #fff;
        }
        #copybutton{
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 0 10px;
            transition: 0.3s;
        }
        #copybutton:hover{
            color: #00d2ff;
            text-shadow: 0 0 10px #00d2ff;
        }
        .pg-setting{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .setting{
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #fff;
        }
        .setting input{
            width: 60px;
            background: #0b0d17;
            border: 2px solid #00d2ff;
            color: #fff;
            padding: 5px;
            text-align: center;
            border-radius: 5px;
        }
        .glowbutton{
            background: #00d2ff;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.4s;
        }
        .glowbutton:hover{
            box-shadow: 0 0 20px #00d2ff;
            transform: translateY(-2px);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Secure Password</h2>
        <div class="display">
           <input type="text" id="password" readonly placeholder="Generate Password">
           <button id="copybutton" title="copy"><i class="fa-regular fa-copy"></i></button>
        </div>
        <div class="pg-setting">
            <div class="setting">
                <span>Length</span>
                <input type="number" id="length" min="8" max="32" value="12">
            </div>
            <button id="generatorbutton" class="glowbutton">Generate</button>
        </div>
    </div>
</body>
<script>
    const passwordInput=document.getElementById("password");
    const lengthInput=document.getElementById("length");
    const generatorbutton=document.getElementById("generatorbutton");
    const copybutton=document.getElementById("copybutton");
    const charset="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890!@#$%()?^&*";
    generatorbutton.onclick=()=>{
        let password="";
        for(let i=0;i<lengthInput.value;i++){
            password+=charset.charAt(Math.floor(Math.random()*charset.length));
        }
        passwordInput.value=password;
    };
    copybutton.onclick=()=>{
        if(passwordInput.value){
            passwordInput.select();
            document.execCommand("copy");
            alert("Password copied to clipboard");
        }
    }
</script>
</html>
